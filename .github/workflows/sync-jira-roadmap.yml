name: Sync Jira public roadmap

on:
  # Optional safety net — full JQL reconcile. Disable if you only want webhook-driven sync.
  schedule:
    - cron: "0 3 * * 0"   # weekly, Sunday 03:00 UTC

  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: "Epic key (e.g. STRX-123). Leave empty for full JQL reconcile."
        required: false
        type: string

  repository_dispatch:
    types: [jira-roadmap-sync]

permissions:
  contents: read
  issues: write
  organization-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Sync Jira → GitHub Issues + Project
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ROADMAP_SYNC_GITHUB_TOKEN }}
          ROADMAP_SYNC_CONFIG: roadmap-sync.yaml
          JIRA_ISSUE_KEY: ${{ github.event.client_payload.issue_key || github.event.inputs.jira_issue_key || '' }}
        run: python scripts/sync_jira_roadmap.py
